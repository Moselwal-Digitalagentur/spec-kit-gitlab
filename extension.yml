schema_version: "1.0"

extension:
  id: "gitlab"
  name: "spec-kit GitLab Integration"
  version: "1.0.0"
  description: "GitLab-Integration für spec-kit: Issues erstellen, synchronisieren und Status-Updates via glab CLI"
  author: "Kaio Lehartwig"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"
  tools:
    - name: "glab"
      version: ">=1.0.0"
      required: true

provides:
  commands:
    - name: "speckit.gitlab.init"
      file: "commands/init.md"
      description: "GitLab-Konfiguration interaktiv einrichten"

    - name: "speckit.gitlab.tasks-to-issues"
      file: "commands/tasks-to-issues.md"
      description: "Tasks aus tasks.md als GitLab Issues (Type: Task) erstellen"

    - name: "speckit.gitlab.stories-to-issues"
      file: "commands/stories-to-issues.md"
      description: "User Stories aus spec.md als GitLab Issues erstellen"

    - name: "speckit.gitlab.feature-to-issue"
      file: "commands/feature-to-issue.md"
      description: "Feature als GitLab Issue erstellen und Stories verlinken"

    - name: "speckit.gitlab.import-feature"
      file: "commands/import-feature.md"
      description: "Bestehendes GitLab Issue als Feature importieren"

    - name: "speckit.gitlab.close-issues"
      file: "commands/close-issues.md"
      description: "Erledigte Tasks/Stories in GitLab schließen, wieder geöffnete reopenen"

    - name: "speckit.gitlab.sync"
      file: "commands/sync.md"
      description: "GitLab Issues in spec-kit Dateien importieren/synchronisieren"

    - name: "speckit.gitlab.status"
      file: "commands/status.md"
      description: "Status von GitLab Issues in tasks.md updaten"

  config:
    - name: "gitlab-config.yml"
      template: "gitlab-config.template.yml"
      description: "GitLab-Server URL, Projekt-Pfad und Label-Konfiguration"
      required: true

hooks:
  after_tasks:
    command: "speckit.gitlab.tasks-to-issues"
    optional: true
    prompt: "Tasks als GitLab Issues erstellen?"
    description: "Erstellt automatisch GitLab Issues nach Task-Generierung"
    condition: null

tags:
  - "gitlab"
  - "issues"
  - "sync"
  - "self-hosted"

defaults:
  gitlab:
    url: ""
    project: ""
  labels:
    story_label: "user-story"
    task_label: "task"
    speckit_label: "spec-kit"
    feature_label: "feature"
  mapping:
    priority_to_label: true
    feature_to_milestone: true
    feature_to_issue: true
    link_tasks_to_stories: true
